[package]
name = "backend"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1.0.218", features = ["derive"] }
api = {path = "./api"}
tokio = { version = "1.43.0", features = ["full"] }
axum = { version = "0.8.1", features = ["macros"] }
tower-http = { version = "0.6.2", features = ["cors"] }
sha2 = "0.10.2"
hmac = "0.12.1"
hex = "0.4.3"
serde_json = "1.0.97"